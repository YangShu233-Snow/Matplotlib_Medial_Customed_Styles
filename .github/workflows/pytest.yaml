name: Python Testing

# 触发条件：push 到任何分支，或者针对 main 分支的 PR
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest matplotlib mpl-0.19.0 # 根据你的需求添加其他依赖

    - name: Run tests with pytest
      run: |
        pytest -v